<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="40" fill="#0f172a"/>
  <circle cx="200" cy="180" r="124" fill="url(#gradient)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="200" cy="160" r="110" fill="#0f172a"/>
  <text x="200" y="170" fill="#fff" font-family="Inter, sans-serif" font-size="96" font-weight="700" text-anchor="middle" dominant-baseline="middle">KD</text>
  <path d="M120 280c20-20 45-30 80-30s60 10 80 30" stroke="#e0f2fe" stroke-width="14" fill="none" stroke-linecap="round"/>
  <text x="200" y="320" fill="#93c5fd" font-family="Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">Frontend Developer</text>
</svg>